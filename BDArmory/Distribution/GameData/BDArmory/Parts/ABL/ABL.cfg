PART
{
// Kerbal Space Program - Part Config
//
//

// --- general parameters ---
name = bahaABL
module = Part
author = BahamutoD

// --- asset parameters ---
mesh = model.mu
rescaleFactor = 1


// --- node definitions ---
node_attach = 0.0, -0.573, 0, 0, -1, 0, 1
node_stack_bottom = 0.0, -0.573, 0, 0, -1, 0, 1

// --- editor parameters ---
TechRequired = precisionEngineering
entryCost = 25000
cost = 10000
category = none
bdacategory = Laser turrets
subcategory = 0
bulkheadProfiles = size1, srf
title = #loc_BDArmory_part_bahaABL_title  //USAF Airborne Laser
manufacturer = #loc_BDArmory_agent_title  //Bahamuto Dynamics
description = #loc_BDArmory_part_bahaABL_description  //A high powered laser for setting things on fire.  Uses 350 electric charge per second.
// attachment rules: stack, srfAttach, allowStack, allowSrfAttach, allowCollision
attachRules = 1,1,0,0,1
tags = #loc_BDArmory_part_bahaABL_tags

// --- standard part parameters ---
mass = 0.8
dragModelType = default
maximum_drag = 0.2
minimum_drag = 0.2
angularDrag = 2
crashTolerance = 60
maxTemp = 3600

stagingIcon = SOLID_BOOSTER



MODULE
{
	name = ModuleTurret

	pitchTransformName = aimPitch
	yawTransformName = aimRotate

	pitchSpeedDPS = 220
	yawSpeedDPS = 220

	maxPitch = 90
	minPitch = -15

	yawRange = 360

	smoothRotation = true
	smoothMultiplier = 20
}

MODULE
{
	name = ModuleWeapon

	fireTransformName = fireTransform

	hasDeployAnim = true
	deployAnimName = deployAnimation
	hasFireAnimation = false

	maxEffectiveDistance = 5000
	maxTargetingRange = 5000
	maxDeviation = 0.0125 // Affects pulse divergence for pulse lasers, otherwise is unused for lasers

	ammoName = ElectricCharge
	requestResourceAmount = 350

	weaponType = laser
	laserDamage = 1100 // Base laser or microwave damage. For conicAoE=false lasers, final damage is multiplied by exp(-gamma * distance * atmDensity / 1.225) where gamma is LASER_ATM_GAMMA for in-atmosphere or LASER_WATER_GAMMA for underwater
	tanAngle = 0.000016 // Affects much laser/microwave damage drops off over distance. tan(θ) = λ/A where λ is laser wavelength, and A is aperture diameter of beam at source
		// For conicAoE = false, damage drops off by 1 / (1 + 2 * distance * tanAngle / aperture)²
		// For conicAoE = true, is converted to directivity (gain) for microwave weapons. (directivity = 1/(1 - cos(atan(tanAngle)))). Final damage scales with  1/(1+4π/directivity*distance²), and is not affected by atmospheric attenuation, does not work in water.
	aperture = 0.8 // Affects much laser/microwave damage drops off over distance. Diameter of beam at source in meters, should roughly correspond to mirror size. A = λ/tan(θ), where λ is laser wavelength, and tan(θ) is laser divergence over distance. If not set, is defaulted to unrealistic value of 5m, but this gives older configs without this value approximately same damage drop-off as before without adjusting tanAngle.
	// LaserGrowTime = -1 // Time laser to be fired to go from base to max damage
    // DynamicBeamColor = false // Beam color changes longer laser fired, for growlasers
    // beamScrollRate = 0.5f // Beam texture scroll rate, for plasma beams, etc
    // beamScalar = 0.01f // X scaling for beam texture. lower is more stretched
    // pulseLaser = false // Pulse vs beam
    // HEpulses = false // Do the pulses have blast damage
    // HeatRay = false // Laser heats parts instead of doing damage
    // electroLaser = false // Drains EC from target/induces EMP effects
    // conicAoE = false // Adjusts which damage drop-off formula is used:
		// For conicAoE = false, laser damage dropoff: finalDamage = laserDamage * exp(-gamma * distance * atmDensity / 1.225) / (1 + 2 * distance * tanAngle / aperture)²
		// For conicAoE = true, microwave weapon dropoff: finalDamage = (laserDamage/(1+4π/directivity*distance²)
    // beamFOV = 20 // FoV angle of the beam when conicAoE = true. Targets inside FOV are affected, damage is still controlled by tanAngle

	isAPS = true
	APSType = missile
	dualModeAPS = true

	projectileColor = 255, 20, 0, 128 //RGBA 0-255
	tracerStartWidth = 0.3
	tracerEndWidth = 0.3

	maxHeat = 3600
	heatPerShot = 40
	heatLoss = 740

	fireSoundPath = BDArmory/Parts/ABL/sounds/laser
	chargeSoundPath = BDArmory/Parts/ABL/sounds/charge
	overheatSoundPath = BDArmory/Parts/ABL/sounds/drain
	oneShotSound = false
	soundRepeatTime = 0
}

}
